kind = "web"
previewPath = "/"
title = "Hormang Landing Page"
version = "1.0.0"
id = "artifacts/hormang-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24908

[services.development]
run = "pnpm --filter @workspace/hormang-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hormang-landing", "run", "build" ]
publicDir = "artifacts/hormang-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24908"
BASE_PATH = "/"
